<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسلامک سکول برائے بچے</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Arabic', system-ui; }
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: scale(1.08); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen">

  <!-- Header -->
  <header class="bg-green-700 text-white p-4 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold">🌟 اسلامی سکول</h1>
      <div class="flex gap-4">
        <button onclick="switchLanguage()" class="bg-white text-green-700 px-4 py-2 rounded-full font-semibold">EN / اردو</button>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto p-6">
    <!-- Home Grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-6" id="homeGrid">
      <!-- Cards will be injected by JS -->
    </div>

    <!-- Noorani Qaida Section -->
    <div id="qaidaScreen" class="hidden">
      <button onclick="goHome()" class="mb-4 text-green-700">← واپس</button>
      <h2 class="text-3xl font-bold text-center mb-6">نورانی قاعدہ</h2>
      <div class="grid grid-cols-4 gap-4 text-4xl text-center" id="letters"></div>
      <audio id="qaidaAudio" controls class="w-full mt-6"></audio>
    </div>

    <!-- Prayer Section -->
    <div id="prayerScreen" class="hidden">
      <button onclick="goHome()" class="mb-4 text-green-700">← واپس</button>
      <h2 class="text-3xl font-bold text-center mb-6">نماز و طہارت</h2>
      <div class="bg-white rounded-3xl p-8 shadow-xl">
        <h3 class="text-2xl mb-4">وضو کے مراحل</h3>
        <ol class="space-y-4 text-lg">
          <li>1. نیت کریں <span class="text-green-600">🤲</span></li>
          <li>2. ہاتھ دھوئیں <span class="text-green-600">👐</span></li>
          <!-- مزید مراحل -->
        </ol>
      </div>
    </div>

    <!-- Quiz -->
    <div id="quizScreen" class="hidden bg-white rounded-3xl p-8 shadow-xl">
      <button onclick="goHome()" class="mb-4 text-green-700">← واپس</button>
      <h2 class="text-3xl font-bold text-center mb-6">ذہنی آزمائش</h2>
      <div id="quizContent"></div>
    </div>
  </div>

  <script>
    // Sample Data
    const categories = [
      { title: "نورانی قاعدہ", icon: "📖", color: "blue", screen: "qaida" },
      { title: "نماز و طہارت", icon: "🙏", color: "purple", screen: "prayer" },
      { title: "کوئز", icon: "🧠", color: "red", screen: "quiz" },
    ];

    // Render Home
    function renderHome() {
      const grid = document.getElementById('homeGrid');
      grid.innerHTML = categories.map(cat => `
        <div onclick="showScreen('${cat.screen}')" class="bg-white rounded-3xl p-8 text-center card-hover cursor-pointer">
          <div class="text-7xl mb-4">${cat.icon}</div>
          <h3 class="text-2xl font-bold">${cat.title}</h3>
        </div>
      `).join('');
    }

    function showScreen(screen) {
      document.getElementById('homeGrid').classList.add('hidden');
      document.getElementById(screen + 'Screen').classList.remove('hidden');
      
      if (screen === 'qaida') loadQaida();
      if (screen === 'quiz') loadQuiz();
    }

    function goHome() {
      document.querySelectorAll('.hidden').forEach(el => el.classList.add('hidden'));
      document.getElementById('homeGrid').classList.remove('hidden');
    }

    // Noorani Qaida
    function loadQaida() {
      const lettersDiv = document.getElementById('letters');
      const arabicLetters = 'اب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ک ل م ن و ہ ی'.split(' ');
      lettersDiv.innerHTML = arabicLetters.map(l => `
        <div onclick="playLetter('${l}')" class="bg-green-100 hover:bg-green-200 p-6 rounded-2xl text-5xl cursor-pointer">${l}</div>
      `).join('');
    }

    function playLetter(letter) {
      alert('آواز چل رہی ہے: ' + letter + ' (اصل میں آڈیو لنک لگائیں)');
    }

    // Simple Quiz
    let currentQ = 0;
    let score = 0;
    const quizQuestions = [
      { q: "سب سے پہلے نبی کون ہیں؟", a: "حضرت آدم علیہ السلام", options: ["حضرت آدم", "حضرت موسیٰ", "حضرت عیسیٰ"] }
    ];

    function loadQuiz() {
      const div = document.getElementById('quizContent');
      div.innerHTML = `
        <p class="text-2xl mb-6">${quizQuestions[0].q}</p>
        ${quizQuestions[0].options.map(opt => `
          <button onclick="answer('${opt}')" class="block w-full text-left p-4 mb-3 bg-gray-100 hover:bg-green-100 rounded-2xl text-xl">${opt}</button>
        `).join('')}
        <p class="mt-6 text-xl">اسکور: <span id="score">${score}</span></p>
      `;
    }

    function answer(selected) {
      if (selected.includes("آدم")) score++;
      alert("بہت اچھا! آپ کا اسکور: " + score);
      goHome();
    }

    function switchLanguage() {
      alert("زبان تبدیل ہو گئی (مکمل ملٹی لینگویج کے لیے JS لاجک بڑھایا جا سکتا ہے)");
    }

    // Initialize
    renderHome();
  </script>
</body>
</html>
